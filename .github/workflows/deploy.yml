name: Deploy to Vercel Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_oIgrcaqGc4wSHcprT90byeWV
      VERCEL_PROJECT_ID: prj_fOVFEBsp0KlenBxbHTw7ucPymMxX
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Check Vercel Token
        if: env.VERCEL_TOKEN == ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "ERROR: VERCEL_TOKEN is not set in GitHub Secrets."
          echo "Please add it to your repository settings: Settings > Secrets and variables > Actions"
          exit 1

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
